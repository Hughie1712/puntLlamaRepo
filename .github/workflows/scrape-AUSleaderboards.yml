name: Scrape AUS Jockeys & Trainers Leaderboards

on:
  schedule:
    - cron: '0 20 * * *'     # Runs daily at 6:00 AM AEST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'           # ← Must be 24
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libasound2

      - name: Install dependencies
        run: npm install

      - name: Install Chrome for Puppeteer
        run: sudo npx --yes puppeteer browsers install chrome

      - name: Create Firebase service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > serviceAccountKey.json

      - name: Run scraper
        run: node scrape-AUSall-premierships.js

      - name: Clean up service account key
        if: always()
        run: rm -f serviceAccountKey.json